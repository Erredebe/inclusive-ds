<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iv-button playground</title>
    <script type="module" src="/build/ivbutton.esm.js"></script>
    <script nomodule src="/build/ivbutton.js"></script>
  </head>
  <body style="font-family: sans-serif; padding: 24px; display: grid; gap: 12px;">

    <iv-button>V1 Primary</iv-button>

  </body>
</html>
