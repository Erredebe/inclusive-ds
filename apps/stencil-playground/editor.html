<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inclusiv DS - Editor</title>
    <style>
      :root {
        font-family: 'DM Sans', 'Segoe UI', sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: #0b1f1d;
        background:
          radial-gradient(circle at 0% 0%, #d6efe8 0%, transparent 35%),
          linear-gradient(180deg, #ecf7f4 0%, #f8fcfb 100%);
      }

      .editor-layout {
        display: grid;
        grid-template-columns: 280px 1fr 320px;
        min-height: 100vh;
      }

      .panel {
        border-right: 1px solid #cde7e3;
        background: #ffffff;
        padding: 16px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 16px;
      }

      .panel--right {
        border-right: 0;
        border-left: 1px solid #cde7e3;
      }

      .panel__header h1,
      .panel__header h2 {
        margin: 0;
        font-size: 1.25rem;
      }

      .panel__header p {
        margin: 8px 0 10px;
        color: #4b5563;
        font-size: 0.9rem;
      }

      .panel__header a {
        color: #0f766e;
        text-decoration: none;
        font-weight: 600;
      }

      .palette {
        display: grid;
        gap: 10px;
        align-content: start;
      }

      .palette-item {
        border: 1px solid #cde7e3;
        border-radius: 10px;
        padding: 10px 12px;
        background: #f7fbfa;
        text-align: left;
        cursor: grab;
        font-size: 0.95rem;
      }

      .palette-item:active {
        cursor: grabbing;
      }

      .workspace {
        padding: 20px 18px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
      }

      .workspace__toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .toolbar-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #4b5563;
      }

      .toolbar-controls label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.9rem;
      }

      .toolbar-controls input[type='range'] {
        width: 120px;
      }

      .clear-btn {
        border: 1px solid #cde7e3;
        border-radius: 8px;
        background: #fff;
        padding: 8px 10px;
        cursor: pointer;
      }

      .workspace__actions {
        display: inline-flex;
        gap: 8px;
      }

      .preview-btn {
        border: 1px solid #0f766e;
        border-radius: 8px;
        background: #0f766e;
        color: #fff;
        padding: 8px 10px;
        cursor: pointer;
      }

      .canvas {
        border: 2px dashed #b8ddd6;
        border-radius: 14px;
        background: #fff;
        padding: 14px;
        display: grid;
        align-content: start;
        gap: 12px;
        min-height: 320px;
        position: relative;
      }

      .canvas--preview {
        border-style: solid;
      }

      .canvas-preview-item {
        grid-column: span var(--col-span, 12);
        grid-row: span var(--row-span, 1);
      }

      .canvas--show-grid {
        background-image:
          linear-gradient(to right, rgba(12, 116, 109, 0.09) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(12, 116, 109, 0.06) 1px, transparent 1px);
        background-size: calc(100% / 12) 24px;
      }

      .canvas--active {
        border-color: #0f766e;
        background: #f0fbf8;
      }

      .canvas__empty {
        margin: 0;
        color: #6b7280;
      }

      .canvas-item {
        border: 1px solid #e0efec;
        border-radius: 10px;
        padding: 10px;
        background: #fcfefd;
        grid-column: span var(--col-span, 12);
        grid-row: span var(--row-span, 1);
        cursor: grab;
        transition: box-shadow 0.2s ease;
      }

      .canvas-item__preview {
        margin-bottom: 10px;
      }

      .canvas-item__slots {
        display: grid;
        gap: 8px;
      }

      .slot-section {
        border-top: 1px dashed #dbece8;
        padding-top: 8px;
      }

      .slot-section__title {
        margin: 0 0 6px;
        font-size: 0.75rem;
        color: #4b5563;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .slot-dropzone {
        border: 1px dashed #cde7e3;
        border-radius: 8px;
        padding: 8px;
        display: grid;
        gap: 8px;
        background: #f9fdfc;
      }

      .slot-dropzone--active {
        border-color: #0f766e;
        background: #ecfaf7;
      }

      .slot-dropzone__empty {
        margin: 0;
        color: #6b7280;
        font-size: 0.8rem;
      }

      .canvas-item:active {
        cursor: grabbing;
      }

      .canvas-item--selected {
        border-color: #0f766e;
        box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.12);
      }

      .canvas-item--drop-before {
        box-shadow: inset 0 3px 0 #0f766e;
      }

      .canvas-item--drop-after {
        box-shadow: inset 0 -3px 0 #0f766e;
      }

      .canvas-item__meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .canvas-item__name {
        font-size: 0.8rem;
        color: #4b5563;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .canvas-item__actions {
        display: inline-flex;
        gap: 4px;
      }

      .canvas-item__actions button {
        border: 1px solid #d9ebe7;
        border-radius: 6px;
        background: #fff;
        color: #355b56;
        cursor: pointer;
        padding: 2px 6px;
        font-size: 0.75rem;
      }

      .inspector {
        align-content: start;
        overflow: auto;
      }

      .inspector__empty {
        margin: 0;
        color: #6b7280;
      }

      .inspector__section {
        border: 1px solid #dfeeea;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
        background: #fbfefd;
      }

      .inspector__section h3 {
        margin: 0 0 10px;
        font-size: 0.95rem;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 10px;
      }

      .field:last-child {
        margin-bottom: 0;
      }

      .field label {
        font-size: 0.82rem;
        color: #4b5563;
      }

      .field input,
      .field select,
      .field textarea {
        border: 1px solid #cde7e3;
        border-radius: 8px;
        padding: 8px;
        font: inherit;
        background: #fff;
      }

      .field--checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .field--checkbox label {
        margin: 0;
      }

      .inspector__actions {
        display: flex;
        gap: 8px;
      }

      .inspector__actions button {
        border: 1px solid #cde7e3;
        border-radius: 8px;
        background: #fff;
        padding: 8px 10px;
        cursor: pointer;
      }

      .editor--preview .panel,
      .editor--preview .toolbar-controls,
      .editor--preview #clear-canvas,
      .editor--preview .canvas-item__meta,
      .editor--preview .canvas-item__slots {
        display: none;
      }

      .editor--preview .editor-layout {
        grid-template-columns: 1fr;
      }

      .editor--preview .workspace {
        padding: 20px;
      }

      .editor--preview .workspace__toolbar {
        justify-content: flex-end;
      }

      @media (max-width: 900px) {
        .editor-layout {
          grid-template-columns: 1fr;
        }

        .panel {
          border-right: 0;
          border-bottom: 1px solid #cde7e3;
        }

        .panel--right {
          border-left: 0;
          border-top: 1px solid #cde7e3;
        }
      }
    </style>
  </head>
  <body>
    <div class="editor-layout">
      <aside class="panel">
        <div class="panel__header">
          <h1>Editor</h1>
          <p>Arrastra componentes al lienzo, reordena y personaliza todas sus props.</p>
          <a href="/">Volver al playground</a>
        </div>

        <div class="palette" id="palette">
          <button class="palette-item" draggable="true" data-component="iv-container">
            Container
          </button>
          <button class="palette-item" draggable="true" data-component="iv-heading">Heading</button>
          <button class="palette-item" draggable="true" data-component="iv-text">Text</button>
          <button class="palette-item" draggable="true" data-component="iv-button">Button</button>
          <button class="palette-item" draggable="true" data-component="iv-input">Input</button>
          <button class="palette-item" draggable="true" data-component="iv-badge">Badge</button>
          <button class="palette-item" draggable="true" data-component="iv-spinner">Spinner</button>
          <button class="palette-item" draggable="true" data-component="iv-checkbox">
            Checkbox
          </button>
          <button class="palette-item" draggable="true" data-component="iv-radio-group">
            Radio Group
          </button>
          <button class="palette-item" draggable="true" data-component="iv-toggle">Toggle</button>
          <button class="palette-item" draggable="true" data-component="iv-form-field">
            Form Field
          </button>
          <button class="palette-item" draggable="true" data-component="iv-dialog">Dialog</button>
        </div>
      </aside>

      <main class="workspace">
        <div class="workspace__toolbar">
          <strong>Lienzo</strong>
          <div class="toolbar-controls">
            <label>
              <input id="toggle-grid" type="checkbox" checked />
              Mostrar grid
            </label>
            <label>
              Gap
              <input id="grid-gap" type="range" min="6" max="24" value="12" />
            </label>
          </div>
          <div class="workspace__actions">
            <button id="toggle-preview-mode" class="preview-btn" type="button">Preview</button>
            <button id="clear-canvas" class="clear-btn" type="button">Limpiar</button>
          </div>
        </div>
        <section class="canvas canvas--show-grid" id="drop-canvas">
          <p class="canvas__empty">Suelta aqui los componentes para empezar.</p>
        </section>
      </main>

      <aside class="panel panel--right inspector">
        <div class="panel__header">
          <h2>Inspector</h2>
          <p id="inspector-subtitle">Selecciona un bloque para editar sus propiedades.</p>
        </div>
        <div id="inspector-fields">
          <p class="inspector__empty">Selecciona un componente del lienzo.</p>
        </div>
      </aside>
    </div>

    <script type="module" src="/src/editor.ts"></script>
  </body>
</html>
